name: Apply v0.1.18 PV array update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch, release, and clean up
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if grep -q '"version": "0.1.18"' custom_components/bb_hems/manifest.json; then
            echo "v0.1.18 changes already applied."
          else
            cat > /tmp/bb-hems-v0.1.18.patch.b64 <<'PATCH_B64'

PATCH_B64
            base64 -d /tmp/bb-hems-v0.1.18.patch.b64 > /tmp/bb-hems-v0.1.18.patch
            git apply /tmp/bb-hems-v0.1.18.patch
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md custom_components/bb_hems/config_flow.py custom_components/bb_hems/const.py custom_components/bb_hems/coordinator.py custom_components/bb_hems/manifest.json custom_components/bb_hems/sensor.py custom_components/bb_hems/static/panel.js custom_components/bb_hems/translations/de.json custom_components/bb_hems/translations/en.json
            git commit -m "feat: support multiple PV array orientations"
            git push
          fi
          code_sha=$(git rev-parse HEAD)
          if gh release view v0.1.18 >/dev/null 2>&1; then
            echo "Release v0.1.18 already exists."
          else
            gh release create v0.1.18 \
              --target "$code_sha" \
              --title "BB HEMS v0.1.18" \
              --notes "BB HEMS v0.1.18 adds configurable PV arrays with individual azimuth, tilt and optional weighting so multiple PV systems and module fields are evaluated more realistically."
          fi
          git rm .github/workflows/apply-v0.1.18.yml
          git commit -m "chore: remove one-time v0.1.18 workflow"
          git push
