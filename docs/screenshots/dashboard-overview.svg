    <rect x="475" y="544" width="414" height="70" rx="7" class="card"/><circle cx="491" cy="562" r="5" class="ok"/><text x="506" y="567" class="label" fill="#111">Flexible Verbraucher: ja</text><text x="506" y="586" class="small muted">Flexible Verbraucher sind erlaubt, weil Überschuss,</text><text x="506" y="601" class="small muted">Wetterfreigabe, SoC und Batterieschutz passen.</text>
