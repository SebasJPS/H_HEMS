  <text x="49" y="219" class="h2">Energiefluss</text><text x="774" y="219" class="muted small">26.5.2026, 11:11:22</text>
  <rect x="49" y="251" width="254" height="105" rx="7" class="card"/><text x="63" y="276" class="label">PV-Erzeugung</text><text x="63" y="309" class="big">1036.0 W</text><text x="63" y="333" class="small muted">Aus allen PV- und Balkonkraftwerk-Sensoren</text>
  <text x="318" y="310" font-size="24" fill="#555">&gt;</text>
