name: Create v0.1.16 release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view v0.1.16 >/dev/null 2>&1; then
            echo "Release v0.1.16 already exists."
            exit 0
          fi
          gh release create v0.1.16 \
            --target "3ab2b6921c25f8bd76d77413cbcb1a210db83647" \
            --title "BB HEMS v0.1.16" \
            --notes "BB HEMS v0.1.16 keeps PV forecast sensors fully optional in the Home Assistant setup and options flow."
