    <text x="48" y="104" class="small muted">Betrieb</text><text x="185" y="104" class="small muted">sensor.bb_hems_energiemodus</text><text x="48" y="134" class="big">surplus_high</text><text x="48" y="158" class="small muted">Aktueller HEMS-Modus</text>
    <text x="399" y="104" class="small muted">Netz</text><text x="544" y="104" class="small muted">sensor.bb_hems_netzleistung_aktuell</text><text x="399" y="138" class="big">5.0 W</text><text x="399" y="160" class="small muted">Negativ = Einspeisung</text>
    <text x="750" y="104" class="small muted">PV</text><text x="858" y="104" class="small muted">sensor.bb_hems_pv_leistung_gesamt</text><text x="750" y="138" class="big">1036.0 W</text><text x="750" y="160" class="small muted">Summe aller PV-Quellen</text>
    <text x="1102" y="104" class="small muted">Batterie</text><text x="1195" y="104" class="small muted">sensor.bb_hems_batterie_soc_minimum</text><text x="1102" y="138" class="big">95.8 %</text><text x="1102" y="160" class="small muted">Niedrigster SoC</text>
  </g>

