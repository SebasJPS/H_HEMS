<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">JPS HEMS system model mockup</title>
  <desc id="desc">System model showing Home Assistant sensors flowing into the HEMS decision model and then into consumers such as dehumidifiers, wallboxes and heat pumps.</desc>
  <rect width="1280" height="620" fill="#f4f7fa"/>
  <text x="80" y="78" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#16232f">Modulares HEMS-Modell</text>
  <text x="80" y="106" font-family="Inter, Arial, sans-serif" font-size="15" fill="#637486">Quellen werden gesammelt, Entscheidungen zentral berechnet, Verbraucher nach Priorität freigegeben.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="80" y="160" width="260" height="300" rx="8" fill="#fff" stroke="#d9e2ea"/>
    <text x="110" y="202" font-size="18" font-weight="700" fill="#16232f">Quellen</text>
    <text x="110" y="244" font-size="14" fill="#637486">Netzleistung</text>
    <text x="110" y="278" font-size="14" fill="#637486">PV / Balkonkraftwerke</text>
    <text x="110" y="312" font-size="14" fill="#637486">Batterie SoC / Entladung</text>
    <text x="110" y="346" font-size="14" fill="#637486">Wetter / Prognose</text>
    <text x="110" y="380" font-size="14" fill="#637486">Gerätezustände</text>

    <path d="M360 310h120" stroke="#1769aa" stroke-width="3" fill="none"/>
    <path d="M480 310l-12-8v16z" fill="#1769aa"/>

    <rect x="500" y="140" width="280" height="340" rx="8" fill="#fff" stroke="#d9e2ea"/>
    <text x="530" y="182" font-size="18" font-weight="700" fill="#16232f">HEMS-Controller</text>
    <rect x="530" y="216" width="220" height="44" rx="8" fill="#f7fafc" stroke="#d9e2ea"/>
    <text x="552" y="244" font-size="14" fill="#16232f">Energiemodus</text>
    <rect x="530" y="276" width="220" height="44" rx="8" fill="#f7fafc" stroke="#d9e2ea"/>
    <text x="552" y="304" font-size="14" fill="#16232f">Batterieschutz</text>
    <rect x="530" y="336" width="220" height="44" rx="8" fill="#f7fafc" stroke="#d9e2ea"/>
    <text x="552" y="364" font-size="14" fill="#16232f">Überschussfreigabe</text>
    <rect x="530" y="396" width="220" height="44" rx="8" fill="#f7fafc" stroke="#d9e2ea"/>
    <text x="552" y="424" font-size="14" fill="#16232f">Priorität & Grenzwerte</text>

    <path d="M800 310h120" stroke="#1769aa" stroke-width="3" fill="none"/>
    <path d="M920 310l-12-8v16z" fill="#1769aa"/>

    <rect x="940" y="160" width="260" height="300" rx="8" fill="#fff" stroke="#d9e2ea"/>
    <text x="970" y="202" font-size="18" font-weight="700" fill="#16232f">Verbraucher</text>
    <text x="970" y="244" font-size="14" fill="#637486">Luftentfeuchter</text>
    <text x="970" y="278" font-size="14" fill="#637486">Boiler / Warmwasser</text>
    <text x="970" y="312" font-size="14" fill="#637486">Wallboxen</text>
    <text x="970" y="346" font-size="14" fill="#637486">Wärmepumpen</text>
    <text x="970" y="380" font-size="14" fill="#637486">beliebige flexible Lasten</text>
  </g>
</svg>
