    <rect x="475" y="446" width="414" height="84" rx="7" class="card"/><circle cx="491" cy="462" r="5" class="ok"/><text x="506" y="467" class="label" fill="#111">Batterieschutz: nein</text><text x="506" y="486" class="small muted">Kein Batterieschutz: SoC 95.8%, Entladung 7.9 W.</text>
