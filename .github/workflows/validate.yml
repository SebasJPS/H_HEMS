name: Validate BB HEMS

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python files
        run: python -m py_compile custom_components/bb_hems/*.py

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/bb_hems/manifest.json >/dev/null
          python -m json.tool custom_components/bb_hems/translations/de.json >/dev/null
          python -m json.tool custom_components/bb_hems/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null

      - name: Verify release version consistency
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          manifest_version = json.loads(Path("custom_components/bb_hems/manifest.json").read_text())["version"]
          panel = Path("custom_components/bb_hems/static/panel.js").read_text()
          match = re.search(r'BB_HEMS_VERSION\s*=\s*"([^"]+)"', panel)
          if not match:
              raise SystemExit("BB_HEMS_VERSION not found in panel.js")
          panel_version = match.group(1)
          if manifest_version != panel_version:
              raise SystemExit(f"Version mismatch: manifest={manifest_version}, panel={panel_version}")
          if "${{ github.ref_type }}" == "tag":
              tag_version = "${{ github.ref_name }}".removeprefix("v")
              if manifest_version != tag_version:
                  raise SystemExit(f"Tag/version mismatch: tag={tag_version}, manifest={manifest_version}")
          PY
