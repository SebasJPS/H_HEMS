<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BB HEMS</title><style>body{margin:0;background:#f6f7f9;color:#182026;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{max-width:1180px;margin:auto;padding:24px}.grid{display:grid;gap:14px}.metrics{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}.card{background:white;border:1px solid #d9e0e6;border-radius:8px;padding:16px}.value{font-size:24px}.muted{color:#62717d}.ok{color:#0b7a53}.warn{color:#a86400}.bad{color:#a52222}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #d9e0e6;text-align:left}</style></head>
<body><main><h1>BB HEMS</h1><p class="muted">Energiestatus, Einstellungen und Entscheidungslogik</p><section id="metrics" class="grid metrics"></section><section class="card"><h2>Warum entscheidet BB HEMS so?</h2><div id="explain"></div></section><section class="card"><h2>BB HEMS Einstellungen</h2><div id="settings"></div></section></main><script>
const keys=[["energy_mode","Modus"],["grid_power","Netz aktuell"],["grid_average","Netz 15 min"],["pv_power_total","PV gesamt"],["pv_average","PV 15 min"],["battery_soc_min","Batterie min."],["battery_discharge_total","Batterie Entladung"],["active_flexible_loads","Aktive Verbraucher"]];
function isBB(e){const f=e.attributes.friendly_name||"";return e.entity_id.includes("bb_hems")||f.includes("BB HEMS")}
function byKey(states,key){return states.find(e=>isBB(e)&&e.entity_id.endsWith(`_${key}`))}
function fmt(e){if(!e)return"nicht vorhanden";const u=e.attributes.unit_of_measurement||"";return `${e.state}${u?` ${u}`:""}`}
async function load(){const r=await fetch('/api/states',{credentials:'same-origin'});const s=await r.json();metrics.innerHTML=keys.map(([k,l])=>`<div class="card"><div class="muted">${l}</div><div class="value">${fmt(byKey(s,k))}</div></div>`).join('');const surplus=byKey(s,'surplus_available')?.state==='on';const protect=byKey(s,'battery_protect')?.state==='on';const allowed=byKey(s,'flexible_loads_allowed')?.state==='on';explain.innerHTML=`<p class="${surplus?'ok':'warn'}">Überschuss: ${surplus?'verfügbar':'nicht verfügbar'}</p><p class="${protect?'bad':'ok'}">Batterieschutz: ${protect?'aktiv':'inaktiv'}</p><p class="${allowed?'ok':'warn'}">Flexible Verbraucher: ${allowed?'erlaubt':'gesperrt'}</p>`;settings.innerHTML='<table>'+s.filter(isBB).filter(e=>['number','select','switch'].includes(e.entity_id.split('.')[0])).map(e=>`<tr><td>${e.attributes.friendly_name||e.entity_id}</td><td>${fmt(e)}</td></tr>`).join('')+'</table>'}load();setInterval(load,30000);
</script></body></html>
