  <text x="49" y="833" class="h2">Was zuletzt passiert ist</text><text x="731" y="833" class="muted small">Letzte 10 HEMS-Ereignisse</text>
  <g font-size="13"><text x="49" y="887" class="muted">10:53:11</text><circle cx="146" cy="879" r="5" class="warn"/><text x="160" y="884" font-weight="700">Verbraucherstatus geändert</text><text x="160" y="904" class="muted">1 aktive flexible Verbraucher: switch.a8m.</text><line x1="49" y1="920" x2="889" y2="920" class="line"/><text x="49" y="951" class="muted">10:53:11</text><circle cx="146" cy="943" r="5" class="ok"/><text x="160" y="948" font-weight="700">Flexible Verbraucher freigegeben</text><text x="160" y="968" class="muted">Flexible Verbraucher sind erlaubt, weil Überschuss, Wetterfreigabe, SoC und Batterieschutz passen.</text><line x1="49" y1="984" x2="889" y2="984" class="line"/><text x="49" y="1015" class="muted">10:53:11</text><circle cx="146" cy="1007" r="5" class="ok"/><text x="160" y="1012" font-weight="700">Modus geändert</text><text x="160" y="1032" class="muted">auto -&gt; surplus_high. Flexible Verbraucher sind erlaubt.</text><line x1="49" y1="1048" x2="889" y2="1048" class="line"/><text x="49" y="1079" class="muted">10:52:37</text><circle cx="146" cy="1071" r="5" class="warn"/><text x="160" y="1076" font-weight="700">HEMS bewertet</text><text x="160" y="1096" class="muted">Flexible Verbraucher gesperrt: kein Überschuss</text></g>

