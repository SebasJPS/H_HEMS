<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">JPS HEMS configuration mockup</title>
  <desc id="desc">Mockup of the Home Assistant config flow for selecting grid, PV, battery, weather and controllable load entities.</desc>
  <rect width="1280" height="620" fill="#f4f7fa"/>
  <rect x="300" y="46" width="680" height="528" rx="8" fill="#fff" stroke="#d9e2ea"/>
  <text x="340" y="94" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#16232f">JPS HEMS einrichten</text>
  <text x="340" y="122" font-family="Inter, Arial, sans-serif" font-size="14" fill="#637486">Wähle Sensoren und Geräte. Mehrere Entitäten können per Komma getrennt werden.</text>
  <g font-family="Inter, Arial, sans-serif">
    <text x="340" y="166" font-size="13" fill="#637486">Netzleistung aktuell</text>
    <rect x="340" y="176" width="600" height="38" rx="6" fill="#f7fafc" stroke="#cfd9e2"/>
    <text x="358" y="201" font-size="14" fill="#16232f">sensor.power_shelly_gesamt</text>
    <text x="340" y="244" font-size="13" fill="#637486">PV-/Balkonkraftwerk-Leistungssensoren</text>
    <rect x="340" y="254" width="600" height="38" rx="6" fill="#f7fafc" stroke="#cfd9e2"/>
    <text x="358" y="279" font-size="14" fill="#16232f">sensor.pv_sued, sensor.pv_west, sensor.pv_garage</text>
    <text x="340" y="322" font-size="13" fill="#637486">Batterie-SoC-Sensoren</text>
    <rect x="340" y="332" width="600" height="38" rx="6" fill="#f7fafc" stroke="#cfd9e2"/>
    <text x="358" y="357" font-size="14" fill="#16232f">sensor.batterie_eg_soc, sensor.batterie_keller_soc</text>
    <text x="340" y="400" font-size="13" fill="#637486">Flexible Verbraucher</text>
    <rect x="340" y="410" width="600" height="38" rx="6" fill="#f7fafc" stroke="#cfd9e2"/>
    <text x="358" y="435" font-size="14" fill="#16232f">switch.a8m, switch.boiler, switch.wallbox_enable</text>
    <rect x="705" y="496" width="110" height="40" rx="7" fill="#fff" stroke="#cfd9e2"/>
    <text x="735" y="521" font-size="14" fill="#16232f">Zurück</text>
    <rect x="830" y="496" width="110" height="40" rx="7" fill="#1769aa"/>
    <text x="860" y="521" font-size="14" fill="#fff">Weiter</text>
  </g>
</svg>
