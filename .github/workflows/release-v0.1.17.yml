name: Create v0.1.17 release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view v0.1.17 >/dev/null 2>&1; then
            echo "Release v0.1.17 already exists."
            exit 0
          fi
          gh release create v0.1.17 \
            --target "071e76cbaef7a26ea69833f76bbbe5c99cd27454" \
            --title "BB HEMS v0.1.17" \
            --notes "BB HEMS v0.1.17 adds optional battery charge sensors and can conservatively use active battery charging as surplus budget when SoC and weather allow it."
