<svg xmlns="http://www.w3.org/2000/svg" width="1464" height="1730" viewBox="0 0 1464 1730" role="img" aria-labelledby="title desc">
  <title id="title">BB HEMS dashboard screenshot</title>
  <desc id="desc">Dashboard screenshot style view of BB HEMS with current status, energy flow, decisions, event history, configuration and settings.</desc>
  <style>
    text{font-family:Arial,Helvetica,sans-serif;fill:#111}
    .muted{fill:#666}.small{font-size:12px}.label{font-size:13px;font-weight:700;fill:#555}.h1{font-size:28px;font-weight:700}.h2{font-size:16px;font-weight:700}.big{font-size:24px;font-weight:700}.card{fill:#fff;stroke:#e5e5e5}.soft{fill:#f6fbff;stroke:#8ec8ed}.line{stroke:#eee}.ok{fill:#087b56}.warn{fill:#a76000}.btn{fill:#eaf7ff;stroke:#49aee8}.field{fill:#fff;stroke:#e7e7e7}
  </style>
  <rect width="1464" height="1730" fill="#fafafa"/>
