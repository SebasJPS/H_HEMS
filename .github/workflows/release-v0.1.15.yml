name: Create v0.1.15 release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view v0.1.15 >/dev/null 2>&1; then
            echo "Release v0.1.15 already exists."
            exit 0
          fi
          gh release create v0.1.15 \
            --target "$GITHUB_SHA" \
            --title "BB HEMS v0.1.15" \
            --notes "BB HEMS v0.1.15 adds PV forecast window signals, sun-position awareness, PV azimuth/tilt settings, forecast entities and dashboard visibility for the smarter HEMS decision layer."

